appId: com.anonymous.vescpoc
---
- clearState
- launchApp

- extendedWaitUntil:
    visible: DEVELOPMENT SERVERS
    timeout: 15000
- tapOn: 'http://.*:8081'
- extendedWaitUntil:
    visible: No board
    timeout: 60000
- tapOn:
    id: board-selector-trigger
- tapOn:
    id: board-selector-add-board

- extendedWaitUntil:
    visible: Pair your board
    timeout: 15000
- extendedWaitUntil:
    visible: E2E VESC Board
    timeout: 15000
- tapOn: E2E VESC Board

- assertVisible: Name your board
- tapOn:
    id: add-board-name-input
- eraseText
- inputText: E2E Board
- hideKeyboard
- tapOn:
    id: add-board-description-input
- inputText: Created by Maestro
- hideKeyboard
- tapOn:
    id: add-board-name-next

- assertVisible: Battery config
- tapOn:
    id: add-board-battery-next

- assertVisible: Review & save
- assertVisible: E2E Board
- assertVisible: E2E VESC Board
- tapOn:
    id: add-board-save

- assertVisible: E2E Board
- extendedWaitUntil:
    visible:
      id: board-disconnect-button
    timeout: 15000
- assertVisible:
    id: telemetry-motor-temp-cell
- assertVisible:
    id: telemetry-controller-temp-cell
- assertVisible:
    id: telemetry-motor-current-cell
- assertVisible:
    id: telemetry-battery-current-cell
- assertVisible:
    id: battery-bar

- tapOn:
    id: board-edit-button
- assertVisible: Board
- tapOn:
    id: edit-board-info-row
- assertVisible: Board info
- tapOn:
    id: edit-board-name-input
- eraseText
- inputText: E2E Renamed Board
- hideKeyboard
- tapOn:
    id: edit-board-info-save
- assertVisible: E2E Renamed Board

- tapOn:
    id: edit-board-battery-row
- assertVisible: Battery
- tapOn:
    id: edit-board-battery-manual-mode
- tapOn:
    id: edit-board-battery-manual-min-input
- eraseText
- inputText: 70
- hideKeyboard
- tapOn:
    id: edit-board-battery-manual-max-input
- eraseText
- inputText: 84
- hideKeyboard
- tapOn:
    id: edit-board-battery-save
- assertVisible: Manual voltage range

- back
- assertVisible: E2E Renamed Board
- tapOn:
    id: board-disconnect-button
- extendedWaitUntil:
    visible: Board not connected
    timeout: 15000
- tapOn:
    id: floating-bar-connect
- extendedWaitUntil:
    visible:
      id: board-disconnect-button
    timeout: 15000
- assertVisible: E2E Renamed Board
- assertVisible:
    id: telemetry-motor-temp-cell
